<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/responsive.css">

</head>
<body>

<header>

    <nav>

        <h2>Upendra</h2>

        <a href="../index.html">Home</a>

    </nav>

</header>

<section id="contact">

    <h2>Contact Me</h2>

    <form action="#" method="post">

        <input
            type="text"
            name="name"
            placeholder="Your Name"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Your Email"
            required
        >

        <input
            type="text"
            name="subject"
            placeholder="Subject"
        >

        <textarea
            name="message"
            rows="6"
            placeholder="Your Message"
            required
        ></textarea>

        <button type="submit">
            Send Message
        </button>

    </form>

</section>

<footer>

    <p>
        © 2026 Upendra Goud.
        All Rights Reserved.
    </p>

</footer>

</body>
</html>
